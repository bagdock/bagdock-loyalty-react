name: Publish
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: bun install
      - run: bunx tsup src/index.ts src/themes/index.ts --format cjs,esm --dts --clean --external react --external react-dom
      - run: npm publish --provenance --access public
